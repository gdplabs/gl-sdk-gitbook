</text><text class="terminal-2064156249-r3" x="0" y="264" textLength="805.2" clip-path="url(#terminal-2064156249-line-10)">&#160;&#160;For&#160;non-interactive&#160;use,&#160;provide&#160;--url&#160;to&#160;change&#160;the&#160;URL,&#160;--key&#160;</text><text class="terminal-2064156249-r2" x="805.2" y="264" textLength="12.2" clip-path="url(#terminal-2064156249-line-10)">&lt;</text><text class="terminal-2064156249-r4" x="817.4" y="264" textLength="61" clip-path="url(#terminal-2064156249-line-10)">value</text><text class="terminal-2064156249-r2" x="878.4" y="264" textLength="12.2" clip-path="url(#terminal-2064156249-line-10)">&gt;</text><text class="terminal-2064156249-r3" x="890.6" y="264" textLength="36.6" clip-path="url(#terminal-2064156249-line-10)">&#160;to</text><text class="terminal-2064156249-r3" x="1098" y="264" textLength="12.2" clip-path="url(#terminal-2064156249-line-10)">
