<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 180" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-10%" width="106%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Main card -->
  <rect x="30" y="20" width="760" height="140" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="30" y="20" width="760" height="4" rx="2" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="410" y="58" text-anchor="middle" fill="#1a1a2e" font-size="17" font-weight="700">GL Connectors — Unified Connectivity Framework</text>

  <!-- Description -->
  <text x="410" y="82" text-anchor="middle" fill="#6b7280" font-size="12">Provides a comprehensive suite of integration methods enabling AI agents and applications to</text>
  <text x="410" y="100" text-anchor="middle" fill="#6b7280" font-size="12">connect with external services, data sources, and tools through standardized protocols.</text>

  <!-- Component highlights - centered -->
  <g transform="translate(144, 128)">
    <!-- MCP Servers -->
    <rect x="0" y="-14" width="120" height="26" rx="13" fill="#6c5ce7" opacity="0.12"/>
    <circle cx="14" cy="0" r="5" fill="#6c5ce7"/>
    <text x="26" y="4" fill="#6c5ce7" font-size="12" font-weight="600">MCP Servers</text>

    <!-- RESTful API -->
    <rect x="135" y="-14" width="115" height="26" rx="13" fill="#00b894" opacity="0.12"/>
    <circle cx="149" cy="0" r="5" fill="#00b894"/>
    <text x="161" y="4" fill="#00b894" font-size="12" font-weight="600">RESTful API</text>

    <!-- Agent Skills -->
    <rect x="265" y="-14" width="120" height="26" rx="13" fill="#e17055" opacity="0.12"/>
    <circle cx="279" cy="0" r="5" fill="#e17055"/>
    <a href="https://agentskills.io/home" target="_blank">
      <text x="291" y="4" fill="#e17055" font-size="12" font-weight="600">Agent Skills</text>
    </a>

    <!-- Agentic Tools -->
    <rect x="400" y="-14" width="135" height="26" rx="13" fill="#0984e3" opacity="0.12"/>
    <circle cx="414" cy="0" r="5" fill="#0984e3"/>
    <text x="426" y="4" fill="#0984e3" font-size="12" font-weight="600">Agentic Tools</text>
  </g>
</svg>